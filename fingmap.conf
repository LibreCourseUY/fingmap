server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    # SPA routing
    location /fingmap/ {
        try_files $uri $uri/ /fingmap/index.html;
        index index.html;
    }

    # Static assets
    location /fingmap/assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Disable gzip to avoid corrupt content errors
    gzip off;
}